kind = "web"
previewPath = "/"
title = "NumériQ — Bac Info Tunisie"
version = "1.0.0"
id = "artifacts/numeriq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25016

[services.development]
run = "pnpm --filter @workspace/numeriq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/numeriq", "run", "build" ]
publicDir = "artifacts/numeriq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25016"
BASE_PATH = "/"
